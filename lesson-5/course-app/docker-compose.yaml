x-healthcheck: &default-healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

services:
  course-app:
    build: .
    container_name: course-app
    ports:
      - "8080:8080"
    environment:
      APP_STORE: redis
      APP_REDIS_URL: redis://dragonfly:6379/0
    depends_on:
      dragonfly:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/readyz || exit 1"]
    volumes:
      - course_app_data:/appdata

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: dragonfly
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - appdata:/data
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "redis-cli", "ping"]


volumes:
  course_app_data:
  appdata:
